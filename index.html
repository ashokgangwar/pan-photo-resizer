<!DOCTYPE html>
<html>
<head>
  <title>PAN Tool Pro</title>

  <!-- Cropper CSS -->
  <link href="https://unpkg.com/cropperjs/dist/cropper.min.css" rel="stylesheet"/>

  <style>
    body { font-family: Arial; text-align:center; background:#f2f2f2; }
    .box { background:white; padding:20px; margin:20px; border-radius:10px; }
    img { max-width:100%; }
    button { padding:10px; margin:10px; background:green; color:white; border:none; }
  </style>
</head>

<body>

<h2>PAN Photo Tool (Pro)</h2>

<div class="box">
  <input type="file" id="inputImage"><br><br>
  <img id="image">
  <br>

  <label>Brightness</label><br>
  <input type="range" id="bright" min="0.5" max="2" step="0.1" value="1">

  <br><br>
  <button onclick="cropImage()">Download JPG</button>
  <button onclick="makePDF()">Download PDF</button>
</div>

<!-- JS Libraries -->
<script src="https://unpkg.com/cropperjs"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let image = document.getElementById('image');
let cropper;

document.getElementById('inputImage').onchange = function(e){
  let file = e.target.files[0];
  let url = URL.createObjectURL(file);
  image.src = url;

  if(cropper) cropper.destroy();

  cropper = new Cropper(image, {
    aspectRatio: 1,
    viewMode: 1
  });
};

function cropImage(){
  let canvas = cropper.getCroppedCanvas({
    width: 300,
    height: 300
  });

  let ctx = canvas.getContext("2d");
  ctx.filter = "brightness(" + document.getElementById('bright').value + ")";
  ctx.drawImage(canvas,0,0);

  let link = document.createElement('a');
  link.download = "photo.jpg";
  link.href = canvas.toDataURL("image/jpeg",0.8);
  link.click();
}

async function makePDF(){
  const { jsPDF } = window.jspdf;
  let canvas = cropper.getCroppedCanvas({
    width: 300,
    height: 300
  });

  let imgData = canvas.toDataURL("image/jpeg",1.0);

  let pdf = new jsPDF();
  pdf.addImage(imgData,'JPEG',10,10,180,180);
  pdf.save("file.pdf");
}
</script>

</body>
</html>
